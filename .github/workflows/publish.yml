name: Publish Extension
on:
  push:
    tags:
      - 'v*'
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: cd media-src && bun install --frozen-lockfile
      - run: bun ./build.ts
      - name: Publish to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT != '' && secrets.VSCE_PAT || secrets.VS_MARKETPLACE_TOKEN }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "No Marketplace token configured in VSCE_PAT or VS_MARKETPLACE_TOKEN" >&2
            exit 1
          fi
          bunx @vscode/vsce publish -p "$VSCE_PAT"
