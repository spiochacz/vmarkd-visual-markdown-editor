<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>scrolljump harness</title>
    <link rel="stylesheet" href="/vditor/dist/index.css" />
    <link rel="stylesheet" href="/main.css" />
    <style>
      /* Constrain height so the editor scrolls INTERNALLY (pre.vditor-reset),
         mirroring the VS Code webview layout. */
      html,
      body {
        height: 100%;
        margin: 0;
      }
      #app,
      .vditor {
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="/scrolljump.js"></script>
  </body>
</html>
